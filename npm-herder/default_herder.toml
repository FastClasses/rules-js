# npm-herder configuration
# This file marks the root of the npm-herder managed directory.

# Where to write vendored packages
vendor_dir = "vendor"

# Lockfile to parse
lockfile = "pnpm-lock.yaml"

# Skip devDependencies when vendoring
production = false

[buck]
# Starlark load path for generated BUCK targets
rules_path = "//rules/js:js_library.bzl"
# Name of the generated file
file_name = "BUCK"
# Banner comment for the generated BUCK file
generated_file_header = """
# @generated by npm-herder
# Do not edit by hand.
"""

[vendor]
# Max parallel downloads
parallel = 8
# Remove stale vendor directories on sync
clean_stale = true

[platform.linux-x86_64]
os = "linux"
arch = "x64"

[platform.linux-arm64]
os = "linux"
arch = "arm64"

[platform.macos-arm64]
os = "darwin"
arch = "arm64"

[platform.windows-x64]
os = "win"
arch = "x64"
